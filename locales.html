<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda de Bicis</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="style.css" rel="stylesheet">
</head>
<body>
    <nav>
       <div class="container mt-5">
       <h1 >Locales</h1>
       
     </div>
    </nav>

    <section class="map-section">
        <div class="map-route-row">
            <div class="map-card">
                <h2>Encuéntranos en Google Maps</h2>
                <div class="map-wrapper">
                    <iframe
                        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3976.9058983258915!2d-74.12764998475181!3d4.601261896087048!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8e3f9b5946f3f2b7%3A0x1a83d9161d179faf!2sPortal%20del%20Tunal!5e0!3m2!1ses-419!2sco!4v0000000000000"
                        width="600"
                        height="450"
                        style="border:0;"
                        allowfullscreen=""
                        loading="lazy"
                        referrerpolicy="no-referrer-when-downgrade">
                    </iframe>
                </div>
            </div>
            <div class="route-card">
                <div class="route-box">
                    <h2>Ruta </h2>
                    <p>Escribe tu dirección y pulsa el botón para ver la ruta en Google Maps.</p>
                </div>
                <form id="routeForm" class="route-form" onsubmit="return openRoute()">
                    <input id="userAddress" type="text" placeholder="Ej. Calle 47 # 20-23, Bogotá" required>
                    <button type="submit">Obtener ruta</button>
                </form>
            </div>
            <div class="product-card">
                <h2>Opciones de productos</h2>
                <ul class="product-list">
                    <li>Bicicletas de montaña</li>
                    <li>Bicicletas de ruta</li>
                    <li>Bicicletas urbanas</li>
                    <li>Accesorios y cascos</li>
                </ul>
            </div>
        </div>
    </section>

<script>
    function openRoute() {
        const address = document.getElementById('userAddress').value.trim();
        if (!address) {
            return false;
        }
        const destination = 'Portal del Tunal, Bogotá';
        const url = 'https://www.google.com/maps/dir/?api=1&origin=' + encodeURIComponent(address) + '&destination=' + encodeURIComponent(destination) + '&travelmode=driving';
        window.open(url, '_blank');
        return false;
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
